name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q probe runners stages scripts tests
      - name: Validate artifact counts
        run: python runners/check_artifact.py
      - name: Validate Croissant metadata
        run: python scripts/validate_croissant.py
      - name: Run prompt audit
        run: python scripts/audit_prompts.py --summary-only
      - name: Run tests
        run: pytest -q
